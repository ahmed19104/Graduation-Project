<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة (Preview)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
                body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

                .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

                    .card:hover {
                transform: translateY(-5px);
            }

                .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

                .bg-primary-light {
            background-color: #cce5ff;
            color: #004085;
        }

                .bg-success-light {
            background-color: #d4edda;
            color: #155724;
        }

                .bg-warning-light {
            background-color: #fff3cd;
            color: #856404;
        }

                .bg-danger-light {
            background-color: #f8d7da;
            color: #721c24;
        }

                .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
    </style>
</head>
<body>



    <div class="container py-4">
        <div class="row mb-4 align-items-center">
            <div class="col-md-6">
                <h2 class="fw-bold">📊 لوحة تحكم النظام (Dashboard)</h2>
            </div>
            <div class="col-md-6">
                <div class="input-group">
                    <input type="text" id="tokenInput" class="form-control" placeholder="ضع التوكن (Token) الخاص بالأدمن هنا...">
                    <button class="btn btn-primary" onclick="loadDashboardData()">جلب البيانات 🚀</button>
                </div>
                <small id="statusMsg" class="text-muted mt-1 d-block"></small>
            </div>
        </div>



        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted mb-1">إجمالي السياح</h6>
                            <h3 class="mb-0 fw-bold" id="totalTourists">0</h3>
                        </div>
                        <div class="icon-box bg-primary-light">🌍</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted mb-1">المرشدين (نشط/قيد الانتظار)</h6>
                            <h3 class="mb-0 fw-bold"><span id="totalGuides">0</span> / <span id="pendingGuides" class="text-danger fs-5">0</span></h3>
                        </div>
                        <div class="icon-box bg-warning-light">👤</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted mb-1">أرباح الموقع</h6>
                            <h3 class="mb-0 fw-bold text-success">$<span id="totalRevenue">0</span></h3>
                        </div>
                        <div class="icon-box bg-success-light">💰</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted mb-1">مديونيات خارجية</h6>
                            <h3 class="mb-0 fw-bold text-danger">$<span id="totalDebts">0</span></h3>
                        </div>
                        <div class="icon-box bg-danger-light">🧾</div>
                    </div>
                </div>
            </div>
        </div>



        <div class="row g-4 mb-4">
            <div class="col-md-8">
                <div class="card p-4 h-100">
                    <h5 class="fw-bold mb-3">📈 أداء الحجوزات والعمولات (شهرياً)</h5>
                    <div class="chart-container">
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 h-100">
                    <h5 class="fw-bold mb-3">🎯 حالات الحجوزات</h5>
                    <div class="chart-container">
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>
            </div>
        </div>



        <div class="row g-4">
            <div class="col-md-6">
                <div class="card p-4 h-100">
                    <h5 class="fw-bold mb-3">✈️ أكثر الدول زيارة</h5>
                    <div class="chart-container">
                        <canvas id="countriesChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-4 h-100">
                    <h5 class="fw-bold mb-3">⭐ أفضل المرشدين تقييماً</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>الاسم</th>
                                    <th>التقييم</th>
                                    <th>أرباح الموقع منه</th>
                                </tr>
                            </thead>
                            <tbody id="topGuidesTable">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>



    <script>
    // متغيرات لحفظ كائنات الرسم البياني عشان نمسحها لو عملنا تحديث
    let charts = {};

 

    async function loadDashboardData() {
        const token = document.getElementById('tokenInput').value.trim();
        const statusMsg = document.getElementById('statusMsg');

 

        if (!token) {
            statusMsg.innerHTML = "❌ الرجاء إدخال التوكن أولاً!";
            statusMsg.className = "text-danger mt-1 d-block";
            return;
        }

 

        statusMsg.innerHTML = "⏳ جاري جلب البيانات من السيرفر...";
        statusMsg.className = "text-info mt-1 d-block";

 

        try {
            // 🚨 غير الـ URL ده لو الكنترولر بتاعك اسمه مختلف أو الـ Route مختلف
            const response = await fetch('/api/admin/dashboard-stats', {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

 

            const result = await response.json();

 

            if (response.ok && result.isSuccess) {
                statusMsg.innerHTML = "✅ تم جلب البيانات بنجاح!";
                statusMsg.className = "text-success mt-1 d-block";

                updateUI(result.data);
            } else {
                statusMsg.innerHTML = `❌ خطأ: ${result.message || 'غير مصرح لك'}`;
                statusMsg.className = "text-danger mt-1 d-block";
            }
        } catch (error) {
            console.error("Fetch Error: ", error);
            statusMsg.innerHTML = "❌ فشل الاتصال بالسيرفر! تأكد أن السيرفر يعمل.";
            statusMsg.className = "text-danger mt-1 d-block";
        }
    }

 

    function updateUI(data) {
        // 1. تحديث الأرقام السريعة
        document.getElementById('totalTourists').innerText = data.totalTourists || 0;
        document.getElementById('totalGuides').innerText = data.totalGuides || 0;
        document.getElementById('pendingGuides').innerText = data.pendingGuides || 0;
        document.getElementById('totalRevenue').innerText = (data.totalSystemRevenue || 0).toFixed(2);
        document.getElementById('totalDebts').innerText = (data.totalOutstandingDebts || 0).toFixed(2);

 

        // 2. تحديث جدول أفضل المرشدين
        const tbody = document.getElementById('topGuidesTable');
        tbody.innerHTML = '';
        if (data.topRatedGuides && data.topRatedGuides.length > 0) {
            data.topRatedGuides.forEach(guide => {
                tbody.innerHTML += `
<tr>
<td class="fw-bold">${guide.name}</td>
<td><span class="badge bg-warning text-dark">⭐ ${guide.rate.toFixed(1)}</span></td>
<td class="text-success">$${guide.earnings.toFixed(2)}</td>
</tr>
                `;
            });
        } else {
            tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">لا يوجد بيانات للمرشدين بعد</td></tr>';
        }

 

        // 3. رسم الرسوم البيانية
        drawMonthlyChart(data.monthlyPerformance);
        drawStatusChart(data.bookingStatusDistribution);
        drawCountriesChart(data.topTouristCountries);
    }

 

    function drawMonthlyChart(monthlyData) {
        if (!monthlyData) return;

        const ctx = document.getElementById('monthlyChart').getContext('2d');
        if(charts.monthly) charts.monthly.destroy();

 

        charts.monthly = new Chart(ctx, {
            type: 'line',
            data: {
                labels: monthlyData.map(d => d.monthName),
                datasets: [{
                    label: 'أرباح الموقع ($)',
                    data: monthlyData.map(d => d.commission),
                    borderColor: '#198754',
                    backgroundColor: 'rgba(25, 135, 84, 0.2)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4
                }, {
                    label: 'عدد الحجوزات',
                    data: monthlyData.map(d => d.bookingsCount),
                    borderColor: '#0d6efd',
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    type: 'bar' // دمج الـ Bar مع הـ Line
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

 

    function drawStatusChart(statusData) {
        if (!statusData) return;

 

        const ctx = document.getElementById('statusChart').getContext('2d');
        if(charts.status) charts.status.destroy();

 

        charts.status = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: statusData.map(d => d.statusName),
                datasets: [{
                    data: statusData.map(d => d.count),
                    backgroundColor: ['#0d6efd', '#198754', '#dc3545', '#ffc107', '#6c757d']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

 

    function drawCountriesChart(countriesData) {
        if (!countriesData) return;

 

        const ctx = document.getElementById('countriesChart').getContext('2d');
        if(charts.countries) charts.countries.destroy();

 

        charts.countries = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: countriesData.map(d => d.countryName),
                datasets: [{
                    label: 'عدد السياح',
                    data: countriesData.map(d => d.count),
                    backgroundColor: '#0dcaf0',
                    borderRadius: 5
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                indexAxis: 'y' // بيخلي الرسم البياني بالعرض
            }
        });
    }
    </script>



</body>
</html>
